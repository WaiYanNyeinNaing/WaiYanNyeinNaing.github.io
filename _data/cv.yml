        summary: Led multi-agent AI architecture, resulting in large-scale deployments like "Super Technician" and "Ask Bosch".
        highlights:
          - "Project 1 (Super Technician): Built an agentic GenAI system with multimodal understanding (text, voice, on-screen actions) to automate complex vehicle camera calibration workflows end-to-end. Launched pilot for Toyota (2024), demonstrated at CES 2025 (~50% task automation). Lead inventor on two US patents (projected $30M cost savings)."
          - "Project 2 (Ask Bosch): Led architecture of an enterprise LLM-powered RAG solution for search across legal, manufacturing, SAP, and HR systems, used by 400k+ employees. Integrated state-of-the-art LLMs with private cloud and AI safety guardrails."
          - "Project 3 (TTL - Enterprise Risk Intelligence): Led a multi-agent, knowledge-graph-driven AI platform to assess product-launch readiness and risk from enterprise data. Piloted in NA with projected ~$2M/year savings. US patent filed."

      - company: Robert Bosch Pte Ltd
        position: Senior Research Scientist
        location: Singapore
        start_date: 2018-12
        end_date: 2022-10
        summary: Specialized in AI and sensor fusion for robotics, automation, and computer vision.
        highlights:
          - "Project 4 (Waste Sorting): Designed a sensor-fusion deep learning system (RGB + terahertz) to classify recyclable waste, enabling a 20% accuracy improvement. Inventor on six patents."
          - "Project 5 (Aqua Easy): Developed an early disease detection system for shrimp aquaculture and mobile computer vision solution. Technology commercialized as a Bosch-invested startup. Co-inventor on EP patent."
          - "Project 6 (Airport FOD Detection): Developed an AI-based long-range vision system to detect ~5cm foreign objects at 250-300m, achieving ~10x cost savings over radar. Lead inventor on patent."

